<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe LP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>



<body>

   <header class="hero">
    <div class="overlay"></div>
    <div class="hero-copy">
        <h1>今日は、<br>
          ちょっといい自分で。
        </h1>
        <p class="hero-sub">Calm coffee, calm mind.</p>
    </div>
  </header>

  <section class="counter">
    <div class="counter-inner">
      <div class="counter-text fade-up">
        <p class="counter-title">At the counter</p>
        <p class="counter-desc">
          カウンター越しに、<br>
          コーヒーを受け取るだけの時間。
        </p>
      </div>
      
      <div class="counter-image fade-up">
          <img src="counter.jpg" alt="Coffee counter">
      </div>   
    </div>
  </section>

  <section class="interior">
    <div class="interior-inner fade-up">

      <div class="interior-image">
        <img src="interior.jpg" alt="Cafe interior">
      </div>

      <div class="interior-text">
        <p class="interior-title">INSIDE THE CAFE</p>
        <p class="interior-desc">
          明るい店内で、<br>
          それぞれの時間が流れる。
        </p>
      </div>
    </div>  
  </section>
  <section class="philosophy">
  <div class="philosophy-inner fade-up">

    <div class="philosophy-text">
      <p class="philosophy-title">OUR PHILOSOPHY</p>

      <p class="philosophy-desc">
        豆を選ぶことより、<br>
        焙煎を語ることより、<br>
        毎日、飲みたくなるかどうか。
      </p>

      <p class="philosophy-desc">
        気取らず、無理せず、<br>
        生活の中に自然とある一杯を。
      </p>
    </div>

    <div class="philosophy-image">
      <img src="coffee.jpg" alt="Coffee time" loading="lazy">
    </div>

  </div>
</section>
<section class="access">
  <div class="access-inner fade-up">

    <div class="access-text">
      <p class="access-title">ACCESS</p>

      <p class="access-desc">
        朝の散歩の途中に。<br>
        仕事帰りの、少し遠回りに。
      </p>

      <p class="access-info">
        〒000ー0000<br>
        東京都○○区○○1-2-3<br>
        open 8:00 - 18:00
      </p>
    </div>
    <div class="access-map">
      <img src="map.jpg" alt="Cafe location map" loading="lazy">
    </div>
  </div>
</section>
  
  <script>
  const targets = document.querySelectorAll('.fade-up');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
      }
    });
  });

  targets.forEach(target => {
    observer.observe(target);
  });
</script>



</body>
</html>
